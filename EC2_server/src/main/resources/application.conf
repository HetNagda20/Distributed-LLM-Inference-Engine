# HTTP server configuration
http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}
  port = 8080
  port = ${?HTTP_PORT}
}

# AWS Lambda configuration
lambda {
  url = "https://0oy4jqp4ud.execute-api.us-east-1.amazonaws.com/Dev1/prompt"
  url = ${?LAMBDA_URL}
}

# Claude LLM configuration
claude {
  default-temperature = 0.7    # Controls response randomness
  default-max-tokens = 150     # Maximum tokens in generated response
  headers {
    content-type = "application/x-protobuf"
  }
}

# API Gateway service configuration
service {
  api-gateway-url = "https://0oy4jqp4ud.execute-api.us-east-1.amazonaws.com/Dev1/prompt"
  api-gateway-url = ${?API_GATEWAY_URL}
}

# Akka framework configuration
akka {
  loglevel = "DEBUG"
  stdout-loglevel = "DEBUG"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"

  http {
    server {
      preview.enable-http2 = off       # Disable HTTP/2 preview
      idle-timeout = 60 s              # Server connection idle timeout
      interface = ${http.host}         # Bind to configured host
      port = ${http.port}             # Listen on configured port
    }
  }
}